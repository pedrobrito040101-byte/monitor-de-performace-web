<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPerf Studio - Monitor de Performance</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>⚡ WebPerf Studio</h1>
        <p>Analise a saúde do seu código Front-End em segundos</p>
    </header>

    <main class="container">
        <section class="analyzer-box">
            <h2>Insira a URL para análise</h2>
            <div class="input-group">
                <input type="text" id="url-input" placeholder="https://google.com" aria-label="URL para análise">
                <button id="btn-analyze">Analisar Projeto</button>
            </div>
        </section>

        <section id="dashboard" class="dashboard hidden">
            <div class="scores-container">
                
                <div class="score-card">
                    <svg viewBox="0 0 36 36" class="circular-chart green">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path id="score-perf" class="circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <text x="18" y="20.35" class="percentage" id="txt-perf">0</text>
                    </svg>
                    <h3>Performance</h3>
                </div>

                <div class="score-card">
                    <svg viewBox="0 0 36 36" class="circular-chart blue">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path id="score-seo" class="circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <text x="18" y="20.35" class="percentage" id="txt-seo">0</text>
                    </svg>
                    <h3>SEO & Semântica</h3>
                </div>

            </div>

            <div class="report-box">
                <h3>🔍 Diagnóstico de Oportunidades</h3>
                <ul id="report-list"></ul>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
